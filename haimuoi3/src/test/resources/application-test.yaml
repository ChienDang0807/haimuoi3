spring:
  config:
    activate:
      on-profile: test

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

  datasource:
    url: jdbc:h2:mem:haimuoi3-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    mongodb:
      host: localhost
      port: 27010
      database: haimuoi3-test

jwt:
  secret: test-jwt-secret-for-integration-tests-only-min-32-chars
  access-token-expiration: 3600
  refresh-token-expiration: 86400

stripe:
  secret-key: sk_test_placeholder
  webhook-secret: whsec_placeholder

app:
  base-url: http://localhost:4200
