spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${PGHOST:${DATABASE_HOST:localhost}}:${PGPORT:${DATABASE_PORT:5432}}}/${PGDATABASE:${DATABASE_NAME:railway}}
    username: ${PGUSER:${DATABASE_USERNAME:postgres}}
    password: ${PGPASSWORD:${DATABASE_PASSWORD:}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    mongodb:
      # URI must include db path, e.g. .../haimuoi3-backend — or set MONGODB_DATABASE when URI has no path
      uri: ${MONGODB_URI:${MONGO_URL:mongodb://${MONGODB_HOST:localhost}:${MONGODB_PORT:27017}/${MONGODB_DATABASE:haimuoi3-backend}}}
      database: ${MONGODB_DATABASE:haimuoi3-backend}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
