server:
  port: ${PORT:8090}
  address: 0.0.0.0

spring:
  application:
    name: haimuoi3-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt:
  access-token-expiration: 86400      # 24 hours in seconds
  refresh-token-expiration: 7776000   # 90 days in seconds
  # jwt.secret — per profile (dev default in application-dev.yaml; prod requires JWT_SECRET env)

stripe:
  # secret-key, webhook-secret — per profile (prod requires env on Railway)

app:
  base-url: ${APP_BASE_URL:http://localhost:4200}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    web: INFO
