server:
  port: ${PORT:8090}

spring:
  application:
    name: haimuoi3-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 86400      # 24 hours in seconds
  refresh-token-expiration: 7776000   # 90 days in seconds

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

app:
  base-url: ${APP_BASE_URL:http://localhost:4200}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO
