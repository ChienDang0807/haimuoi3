spring:
  config:
    activate:
      on-profile: dev

  devtools:
    add-properties: true
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5431}/${DATABASE_NAME:haimuoi3-backend}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: ${MONGODB_PORT:27010}
      database: ${MONGODB_DATABASE:haimuoi3-backend}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Local dev defaults — override via .env / IDE env (Spring does not load .env file automatically)
jwt:
  secret: ${JWT_SECRET:change-me-local-dev-only-minimum-32-characters-long}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_local_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_local_placeholder}

