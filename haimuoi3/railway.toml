# Railway — Backend (root directory = haimuoi3)
# Docs: haimuoi3/RAILWAY.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Liveness only (Tomcat up). Full /actuator/health may 503 if Postgres/Mongo still down.
healthcheckPath = "/actuator/health/liveness"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
