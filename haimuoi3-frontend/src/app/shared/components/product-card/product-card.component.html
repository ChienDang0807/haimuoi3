<a [routerLink]="['/product', product.id]" class="product-card group cursor-pointer block">
  <div class="relative mb-6 aspect-square overflow-hidden border border-gray-100 bg-white">
    @if (product.badge) {
      <span [class]="getBadgeClass(product.badge.color)">
        {{ product.badge.text }}
      </span>
    }
    @if (showWishlistHeart()) {
      <button
        type="button"
        (click)="onWishlistClick($event)"
        class="absolute top-3 right-3 z-20 flex h-9 w-9 items-center justify-center rounded-full bg-white/90 text-gray-500 shadow-sm backdrop-blur hover:text-red-500"
        [class.text-red-500]="inWishlist"
        [attr.aria-pressed]="inWishlist"
        aria-label="Wishlist">
        @if (inWishlist) {
          <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
        } @else {
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5" />
          </svg>
        }
      </button>
    }
    <img [alt]="product.name" [src]="product.imageUrl" class="product-image h-full w-full object-contain p-8" />

    <button
      type="button"
      (click)="onAddToCart($event)"
      class="absolute bottom-4 left-1/2 z-10 -translate-x-1/2 rounded bg-black px-4 py-2 text-xs font-bold text-white uppercase opacity-0 transition-opacity group-hover:opacity-100 hover:bg-gray-800">
      Add to Cart
    </button>
  </div>

  <h3 class="text-sm font-semibold text-gray-900">{{ product.name }}</h3>
  <p class="mt-1 text-xs tracking-tighter text-gray-500 uppercase">{{ product.description }}</p>
  <p class="mt-2 text-sm font-medium">${{ product.price.toFixed(2) }}</p>
</a>
