<div class="p-6 bg-white rounded-xl border border-primary/10 shadow-sm">
  <div class="flex justify-between items-start mb-4">
    <div class="flex items-center gap-3">
      @if (review().userAvatar) {
        <div class="size-10 rounded-full overflow-hidden">
          <img [src]="review().userAvatar" [alt]="review().userName" class="w-full h-full object-cover" />
        </div>
      } @else {
        <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold">
          {{ userInitials }}
        </div>
      }
      <div>
        <h4 class="font-bold text-slate-900">{{ review().userName }}</h4>
        <p class="text-xs text-slate-500">
          @if (review().verified) {
            <span>Verified Buyer • </span>
          }
          {{ review().date }}
        </p>
      </div>
    </div>
    <app-rating-display [rating]="review().rating" size="sm" />
  </div>
  <p class="text-slate-600 leading-relaxed italic">
    "{{ review().comment }}"
  </p>
</div>
