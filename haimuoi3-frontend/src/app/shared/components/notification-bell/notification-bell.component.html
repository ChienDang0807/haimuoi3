<div class="notification-bell-root relative flex items-center">
  <button
    type="button"
    (click)="togglePanel()"
    [disabled]="isDisabled()"
    [attr.aria-label]="bellAriaLabel()"
    [attr.aria-expanded]="isPanelOpen()"
    class="header-icon-action group relative text-gray-600 hover:text-black disabled:opacity-50 disabled:cursor-not-allowed"
    title="Notifications"
    aria-haspopup="true">
    <!-- Bell icon -->
    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" />
    </svg>

    <!-- Unread badge -->
    @if (unreadCount() > 0) {
      <span class="absolute top-0 right-0 flex h-2 w-2">
        <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-red-400 opacity-75"></span>
        <span class="relative inline-flex h-2 w-2 rounded-full bg-red-500"></span>
        <span class="sr-only">{{ badgeText() }} chưa đọc</span>
      </span>
    }

    <!-- Connection indicators -->
    @if (showPulsing()) {
      <span class="absolute top-0 right-0 flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
        <span class="relative inline-flex h-3 w-3 rounded-full bg-blue-500"></span>
      </span>
    }
    @if (showOffline()) {
      <span class="absolute top-0 right-0 flex h-2 w-2">
        <span class="relative inline-flex h-2 w-2 rounded-full bg-gray-400" aria-label="Mất kết nối thông báo realtime"></span>
      </span>
    }
  </button>

  <!-- Dropdown panel -->
  @if (isPanelOpen()) {
    <div
      class="absolute right-0 top-full z-[70] mt-2 w-80 max-w-[calc(100vw-2rem)] overflow-hidden rounded-xl border border-gray-100 bg-white shadow-xl shadow-black/10">
      @if (notifications().length === 0) {
        <div class="p-6 text-center text-sm text-gray-500">Chưa có thông báo nào</div>
      } @else {
        <ul class="max-h-80 overflow-y-auto">
          @for (dto of notifications().slice(0, 10); track dto.id) {
            <li class="border-b border-gray-100 last:border-0">
              <button
                type="button"
                class="flex w-full items-start gap-3 px-4 py-3 text-left transition-colors hover:bg-gray-50"
                (click)="onNotificationClick(dto)">
                <div class="min-w-0 flex-1">
                  <p class="truncate text-sm font-bold text-gray-900">
                    {{ getNotificationTitle(dto) }}
                  </p>
                  <p class="mt-0.5 text-xs text-gray-500">
                    {{ dto.timestamp | date:'dd/MM/yyyy HH:mm' }}
                  </p>
                  @if (dto.payload['totalAmount'] && typeof dto.payload['totalAmount'] === 'number') {
                    <p class="mt-0.5 text-xs text-gray-600">
                      {{ dto.payload['totalAmount'] | number:'1.0-0':'vi-VN' }} ₫
                    </p>
                  }
                  @if (dto.payload['customerName'] && role() === UserRole.SHOP_OWNER) {
                    <p class="mt-0.5 text-xs text-gray-600">
                      {{ dto.payload['customerName'] }}
                    </p>
                  }
                </div>
              </button>
            </li>
          }
        </ul>
      }
    </div>
  }
</div>
