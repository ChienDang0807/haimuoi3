<header class="flex justify-between items-center w-full px-12 py-6 sticky top-0 z-50 bg-surface/80 backdrop-blur-md dark:bg-surface/80">
  <div class="flex items-center gap-4 w-1/3">
    @if (pageTitle()) {
      <h2 class="text-2xl font-black tracking-tighter text-primary mr-4">{{ pageTitle() }}</h2>
    }
    <div class="relative w-full">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">search</span>
      <input 
        class="w-full bg-surface-container border-none rounded-lg pl-12 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/40" 
        [placeholder]="searchPlaceholder()" 
        type="text"
        (input)="onSearchInput($event)" />
    </div>
  </div>

  <div class="flex items-center gap-6">
    <app-notification-bell />

    <div class="flex items-center gap-3 pl-6 border-l border-outline-variant">
      <div class="text-right">
        <p class="text-sm font-bold leading-tight">Admin User</p>
        <p class="text-[10px] font-black uppercase tracking-widest opacity-50">Store Admin</p>
      </div>
      <button 
        class="w-10 h-10 rounded-full object-cover border-2 border-primary/10 overflow-hidden"
        (click)="onProfileClick()">
        <img 
          alt="Store Admin" 
          class="w-full h-full object-cover"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvh3nqGi23y1-61RhCFvWPFBZ81khNRXv5J-a5SPLZR6WUQOEQoduuN-Wnk8D0MJc3blByIs_hxIApsuW8JNOMsiLAhWVAWGTGRxt7dhd8i1SAgdpgdBLLofVYIlOpWiWgKxZ7ysOVKTEHc2ejpGUw3M3Sud5f0u_sxo8jdM2fOPTNk9CnVbSKNd20IFwIBvrnjF5P3TKoEI4-tQW1dvEmKcBWDUNhTsR7bV-LPXDxAEPptPSPGoQOXQ1MFnaGoBhDEQjrNb581GU" />
      </button>
    </div>
  </div>
</header>
