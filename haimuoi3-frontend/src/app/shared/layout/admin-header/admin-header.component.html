<header class="flex justify-between items-center w-full px-12 py-6 sticky top-0 z-50 bg-surface/80 backdrop-blur-md dark:bg-surface/80">
  <div class="flex items-center gap-4 w-1/3">
    @if (pageTitle()) {
      <h2 class="text-2xl font-black tracking-tighter text-primary mr-4">{{ pageTitle() }}</h2>
    }
    <div class="relative w-full">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">search</span>
      <input
        class="w-full bg-surface-container border-none rounded-lg pl-12 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/40"
        [placeholder]="searchPlaceholder()"
        type="text"
        (input)="onSearchInput($event)" />
    </div>
  </div>

  <div class="flex items-center gap-6">
    <app-notification-bell />

    <div class="account-menu-root relative flex items-center gap-3 pl-6 border-l border-outline-variant">
      <div class="text-right">
        <p class="text-sm font-bold leading-tight">{{ displayName() }}</p>
        <p class="text-[10px] font-black uppercase tracking-widest opacity-50">{{ shopLabel() }}</p>
      </div>
      <button
        type="button"
        class="w-10 h-10 rounded-full border-2 border-primary/10 bg-primary/10 text-sm font-black text-primary"
        (click)="onAccountButtonClick($event)"
        [attr.aria-expanded]="isAccountMenuOpen()"
        aria-controls="admin-account-menu-panel"
        aria-haspopup="true"
        [attr.aria-label]="'Account menu for ' + displayName()">
        {{ accountInitial() }}
      </button>
      @if (isAccountMenuOpen()) {
        <div
          id="admin-account-menu-panel"
          class="absolute right-0 top-full z-[70] mt-2 w-56 overflow-hidden rounded-lg border border-outline-variant bg-surface shadow-xl"
          role="menu">
          <div class="border-b border-outline-variant px-4 py-3">
            <p class="text-sm font-bold text-on-surface">{{ displayName() }}</p>
            @if (displayEmail()) {
              <p class="text-xs text-on-surface-variant">{{ displayEmail() }}</p>
            }
          </div>
          <button
            type="button"
            class="flex w-full items-center gap-3 px-4 py-3 text-left text-sm font-medium text-error transition-colors hover:bg-error-container/10"
            (click)="onLogoutFromMenu()"
            role="menuitem">
            <span class="material-symbols-outlined text-lg">logout</span>
            <span>Logout</span>
          </button>
        </div>
      }
    </div>
  </div>
</header>
