<aside
  class="fixed left-0 top-20 z-40 flex h-[calc(100vh-5rem)] w-72 flex-col gap-y-8 overflow-y-auto bg-surface-container py-12 shadow-2xl shadow-primary/10">
  <div class="flex flex-col gap-2 px-8">
    <div class="h-16 w-16 overflow-hidden rounded-xl border-2 border-white shadow-lg">
      @if (profile()?.avatarUrl && !avatarLoadError()) {
        <img
          [src]="profile()!.avatarUrl!"
          alt="User avatar"
          class="h-full w-full object-cover"
          (error)="onAvatarError()" />
      } @else {
        <div
          class="flex h-full w-full items-center justify-center bg-primary text-2xl font-black text-on-primary">
          {{ initial() }}
        </div>
      }
    </div>
    <div class="mt-4">
      <h2 class="text-xl font-black tracking-tighter text-on-surface uppercase">
        {{ profile()?.fullName || 'Guest' }}
      </h2>
      <p class="text-sm font-medium text-secondary">{{ profile()?.email || accountLabel() }}</p>
    </div>
  </div>

  <nav class="flex-1 space-y-1">
    <a
      class="nav-link flex items-center gap-4 border-l-4 border-transparent py-3 pl-4 text-secondary transition-all duration-300 hover:bg-primary/5 hover:text-on-surface active:translate-x-1"
      routerLink="/account/profile"
      routerLinkActive>
      <span class="material-symbols-outlined text-primary">person</span>
      <span class="font-body text-lg font-medium tracking-tight">Personal Information</span>
    </a>
    <a
      class="nav-link flex items-center gap-4 border-l-4 border-transparent py-3 pl-4 text-secondary transition-all duration-300 hover:bg-primary/5 hover:text-on-surface active:translate-x-1"
      routerLink="/account/wishlist"
      routerLinkActive>
      <span class="material-symbols-outlined text-primary">favorite</span>
      <span class="font-body text-lg font-medium tracking-tight">Wishlist</span>
    </a>
    <a
      class="nav-link flex items-center gap-4 border-l-4 border-transparent py-3 pl-4 text-secondary transition-all duration-300 hover:bg-primary/5 hover:text-on-surface active:translate-x-1"
      routerLink="/account/orders"
      routerLinkActive
      [routerLinkActiveOptions]="{ paths: 'subset', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }">
      <span class="material-symbols-outlined text-primary">local_shipping</span>
      <span class="font-body text-lg font-medium tracking-tight">Order Tracking</span>
    </a>
    <a
      class="nav-link flex items-center gap-4 border-l-4 border-transparent py-3 pl-4 text-secondary transition-all duration-300 hover:bg-primary/5 hover:text-on-surface active:translate-x-1"
      routerLink="/account/payment-methods"
      routerLinkActive>
      <span class="material-symbols-outlined text-primary">payments</span>
      <span class="font-body text-lg font-medium tracking-tight">Payment Methods</span>
    </a>
  </nav>

  <div class="mt-auto space-y-1 border-t border-outline-variant/10 pt-8">
    <button
      type="button"
      class="flex w-full items-center gap-4 py-3 pl-4 text-left text-secondary transition-all duration-300 hover:bg-primary/5 hover:text-on-surface active:translate-x-1">
      <span class="material-symbols-outlined">help</span>
      <span class="font-body text-lg font-medium tracking-tight">Help Center</span>
    </button>
    <a
      class="nav-link flex items-center gap-4 border-l-4 border-transparent py-3 pl-4 text-secondary transition-all duration-300 hover:bg-primary/5 hover:text-on-surface active:translate-x-1"
      routerLink="/account/settings"
      routerLinkActive>
      <span class="material-symbols-outlined">settings</span>
      <span class="font-body text-lg font-medium tracking-tight">Settings</span>
    </a>
    <button
      type="button"
      class="flex w-full items-center gap-4 py-3 pl-4 text-left text-error transition-all duration-300 hover:bg-error/5 active:translate-x-1"
      (click)="logout()">
      <span class="material-symbols-outlined">logout</span>
      <span class="font-body text-lg font-medium tracking-tight">Logout</span>
    </button>
  </div>
</aside>
