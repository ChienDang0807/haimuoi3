<section class="mx-auto max-w-[1440px] px-6 py-24 lg:px-12">
  <div class="mb-12">
    <span class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">The Curation</span>
    <h2 class="mt-2 text-4xl font-medium">Category</h2>
  </div>

  <div class="group relative">
    
    <button 
      (click)="onNavigatePrevious()"
      class="absolute -left-4 top-[35%] z-20 -translate-y-1/2 rounded-full border border-gray-200 bg-white p-4 shadow-md transition-all opacity-0 group-hover:opacity-100 group-hover:left-2 hover:bg-gray-50 lg:p-5"
      aria-label="Previous">
      <svg class="h-5 w-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
      </svg>
    </button>

    <div 
      #scrollContainer
      class="no-scrollbar flex gap-4 overflow-x-auto scroll-smooth snap-x snap-mandatory pb-4 lg:gap-5">
      @for (category of categories; track category.globalCategoryId) {
        <div class="min-w-[78%] flex-shrink-0 snap-start md:min-w-[42%] lg:min-w-[calc(31%_-_14px)]">
          <app-category-card 
            [category]="category"
            (categoryClick)="onCategoryClick($event)" />
        </div>
      }
    </div>

    <button 
      (click)="onNavigateNext()"
      class="absolute -right-4 top-[35%] z-20 -translate-y-1/2 rounded-full border border-gray-200 bg-white p-4 shadow-md transition-all opacity-0 group-hover:opacity-100 group-hover:right-2 hover:bg-gray-50 lg:p-5"
      aria-label="Next">
      <svg class="h-5 w-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
      </svg>
    </button>

  </div>
</section>
