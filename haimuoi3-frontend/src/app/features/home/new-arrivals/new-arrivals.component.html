<section class="bg-gray-50 py-24">
  <div class="mx-auto max-w-[1440px] px-6 lg:px-12">
    <div class="mb-12">
      <div>
        <span class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">Latest Drops</span>
        <h2 class="mt-2 text-4xl font-medium">New Arrivals</h2>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-4">
      @for (product of visibleProducts; track product.id) {
        <app-product-card
          [product]="product"
          [inWishlist]="wishlistRecord[product.id] ?? false"
          (productClick)="onProductClick($event)"
          (wishlistChanged)="onWishlistChanged($event)" />
      }
    </div>

    @if (canLoadMore) {
      <div class="mt-12 flex justify-center">
        <button
          type="button"
          (click)="onLoadMore()"
          [disabled]="isLoadingMore"
          class="rounded-full border border-gray-300 px-8 py-3 text-sm font-semibold tracking-wide text-gray-900 transition-colors hover:bg-gray-900 hover:text-white disabled:cursor-not-allowed disabled:opacity-60"
          aria-label="Load more products">
          {{ isLoadingMore ? 'Đang tải...' : 'Xem thêm' }}
        </button>
      </div>
    }
  </div>
</section>
