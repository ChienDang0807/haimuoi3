<section class="relative w-full">
  <div class="h-[400px] w-full overflow-hidden bg-surface-container-highest">
    <img 
      [alt]="shop().name + ' Banner'" 
      [src]="shop().banner"
      class="w-full h-full object-cover" />
  </div>
  
  <div class="max-w-screen-2xl mx-auto px-8 relative -mt-24 pb-12">
    <div class="bg-surface p-8 shadow-2xl rounded-xl flex flex-col md:flex-row gap-8 items-end md:items-center">
      <div class="w-40 h-40 rounded-xl overflow-hidden shadow-lg border-4 border-surface -mt-24 md:mt-0 flex-shrink-0">
        <img 
          [alt]="shop().name + ' Avatar'" 
          [src]="shop().avatar"
          class="w-full h-full object-cover" />
      </div>
      
      <div class="flex-grow space-y-2">
        <h1 class="text-3xl font-black tracking-tighter text-primary uppercase">{{ shop().name }}</h1>
        <p class="text-on-surface-variant text-lg font-body max-w-2xl">{{ shop().description }}</p>
        
        <div class="flex flex-wrap gap-6 pt-4">
          <div class="flex flex-col">
            <span class="text-[10px] font-black uppercase tracking-widest text-secondary">Member since</span>
            <span class="text-lg font-bold text-on-surface">{{ shop().memberSince }}</span>
          </div>
          <div class="flex flex-col">
            <span class="text-[10px] font-black uppercase tracking-widest text-secondary">Rating</span>
            <span class="flex items-center gap-1 text-lg font-bold text-on-surface">
              {{ shop().rating }} 
              <span class="material-symbols-outlined text-xs filled">star</span>
            </span>
          </div>
          <div class="flex flex-col">
            <span class="text-[10px] font-black uppercase tracking-widest text-secondary">Total Sales</span>
            <span class="text-lg font-bold text-on-surface">{{ (shop().totalSales ?? 0).toLocaleString() }}</span>
          </div>
        </div>
      </div>
      
      <div class="flex flex-col gap-3 w-full md:w-auto">
        <button 
          class="bg-primary text-on-primary px-8 py-3 rounded-lg font-black uppercase text-xs tracking-widest shadow-lg shadow-primary/20 hover:bg-on-primary-fixed-variant transition-all"
          (click)="onFollowClick()">
          Follow Shop
        </button>
        <button 
          class="border border-outline px-8 py-3 rounded-lg font-black uppercase text-xs tracking-widest hover:bg-surface-container transition-all"
          (click)="onMessageClick()">
          Message
        </button>
      </div>
    </div>
  </div>
</section>
