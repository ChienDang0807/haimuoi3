<section class="py-16 border-t border-primary/10">
  <h3 class="text-2xl font-black text-slate-900 mb-8">Sold by</h3>
  <div class="flex flex-col md:flex-row items-center justify-between p-8 bg-white rounded-2xl border border-primary/10 shadow-sm gap-6">
    <div class="flex items-center gap-6">
      <div class="size-20 rounded-full bg-primary/5 flex items-center justify-center overflow-hidden border border-primary/10">
        @if (shop().avatar) {
          <img [src]="shop().avatar" [alt]="shop().name" class="w-full h-full object-cover" />
        } @else {
          <span class="material-symbols-outlined text-4xl text-primary/40">storefront</span>
        }
      </div>
      <div>
        <h4 class="text-xl font-black text-slate-900 mb-1">{{ shop().name }}</h4>
        <div class="flex items-center gap-4 text-sm">
          <div class="flex items-center gap-1">
            <span class="material-symbols-outlined filled text-yellow-400 text-base">star</span>
            <span class="font-bold text-slate-900">{{ shop().rating }}</span>
            <span class="text-slate-500">({{ (shop().totalRatings ?? 0).toLocaleString() }}+ Ratings)</span>
          </div>
          <span class="text-slate-300">|</span>
          <span class="text-slate-500">Member since {{ shop().memberSince }}</span>
        </div>
      </div>
    </div>
    <button
      class="w-full md:w-auto px-10 py-3 rounded-lg border-2 border-primary text-primary font-bold hover:bg-primary hover:text-white transition-all"
      (click)="onVisitStoreClick()">
      Visit Store
    </button>
  </div>
</section>
