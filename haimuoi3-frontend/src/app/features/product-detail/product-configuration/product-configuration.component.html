<div class="space-y-4">
  <h4 class="text-sm font-bold uppercase tracking-wider text-slate-500">{{ title() }}</h4>
  <div class="grid grid-cols-2 gap-3">
    @for (option of options(); track option.id) {
      <button 
        class="flex flex-col p-4 rounded-xl text-left transition-all"
        [class.border-2]="isSelected(option.id)"
        [class.border-primary]="isSelected(option.id)"
        [class.bg-primary/5]="isSelected(option.id)"
        [class.border]="!isSelected(option.id)"
        [class.border-primary/20]="!isSelected(option.id)"
        [class.bg-white]="!isSelected(option.id)"
        [class.hover:border-primary/50]="!isSelected(option.id)"
        (click)="selectOption(option)">
        <span class="font-bold text-slate-900">{{ option.label }}</span>
        @if (option.sublabel) {
          <span class="text-xs text-slate-500">{{ option.sublabel }}</span>
        }
        @if (option.priceModifier && option.priceModifier > 0) {
          <span class="text-xs text-slate-500">+${{ option.priceModifier.toFixed(2) }}</span>
        }
      </button>
    }
  </div>
</div>
