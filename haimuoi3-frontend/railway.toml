# Railway — Frontend (root directory = haimuoi3-frontend)
# Set variable API_URL = https://<your-backend>.up.railway.app/api before deploy

[build]
buildCommand = "npm ci && npm run build:railway"

[deploy]
# Must bind 0.0.0.0 — serve defaults to localhost only → Railway 502
startCommand = "npx --yes serve@14 dist/haimuoi3-frontend/browser -s -l tcp://0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
